name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write      # required to create/update GitHub Releases

jobs:
  build:
    name: Build (arm64 + arm64e · iOS 15 & 16)
    runs-on: macos-14          # Apple M1 runner — Xcode 16, native arm64e clang

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Tools ──────────────────────────────────────────────────────────
      - name: Install build tools
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1      # skip full brew update — already done above
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: brew install ldid dpkg

      # ── 3. Theos (cached) ─────────────────────────────────────────────────
      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: /Users/runner/theos
          # Re-install only when this workflow file changes (Theos version bump etc.)
          key: theos-macos14-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        env:
          THEOS: /Users/runner/theos
          # Authenticated API calls → higher rate limit for SDK downloads
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      # ── 4. Build ──────────────────────────────────────────────────────────
      # Command-line variables override the Makefile's WSL-specific settings:
      #   TARGET  → use Xcode 16's latest SDK (iOS 18 SDK, deploy target stays 14.0)
      #   ARCHS   → fat binary: arm64 (A10/A11, iOS 15) + arm64e (A12+, iOS 16)
      - name: Build package
        env:
          THEOS: /Users/runner/theos
        run: |
          cd VCAMVIP_theos
          make package \
            THEOS_PACKAGE_SCHEME=rootless \
            TARGET="iphone:clang:latest:14.0" \
            ARCHS="arm64 arm64e"

      # ── 5. Verify output ──────────────────────────────────────────────────
      - name: Verify architectures
        run: |
          DEB=$(ls VCAMVIP_theos/packages/*.deb | tail -1)
          echo "Built: $DEB"
          dpkg-deb -x "$DEB" /tmp/chk
          for dylib in /tmp/chk/var/jb/Library/MobileSubstrate/DynamicLibraries/*.dylib; do
            echo "$(basename $dylib): $(lipo -archs $dylib)"
          done

      # ── 6. Upload artifact (PRs and workflow_dispatch only) ──────────────
      # Main and tag pushes get a proper GitHub Release instead (steps 7/8).
      - name: Upload .deb artifact
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: vcamvip-${{ github.ref_name }}-${{ github.sha }}
          path: VCAMVIP_theos/packages/*.deb
          if-no-files-found: error
          retention-days: 30

      # ── 7. Rolling "latest" pre-release (every main push) ────────────────
      # Creates or overwrites the "latest" GitHub Release tag so users always
      # have a direct .deb download URL without logging in or navigating Actions.
      # Direct URL (once the first push lands):
      #   https://github.com/<owner>/<repo>/releases/download/latest/<file>.deb
      - name: Publish rolling latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: true
          make_latest: false
          files: VCAMVIP_theos/packages/*.deb
          body: |
            Rolling build — updated on every push to `main`.
            Fat binary: **arm64** (iPhone 7/8/X · iOS 15) + **arm64e** (iPhone XS+ · iOS 16).

            > **Download the `.deb` file above**, then install via Sileo (drag & drop) or `dpkg -i`.

      # ── 8. Versioned release (tag pushes only) ───────────────────────────
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: VCAMVIP_theos/packages/*.deb
          generate_release_notes: false
          body: |
            Built from tag ${{ github.ref_name }}.
            Fat binary: **arm64** (iPhone 7/8/X · iOS 15) + **arm64e** (iPhone XS+ · iOS 16).
